<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Verification Portal</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>

<style>

body{
    margin:0;
    font-family:'Inter',sans-serif;
    background:linear-gradient(180deg,#0a1f44,#0f2f6f);
    color:#fff;
}

/* HEADER */
.header{
    text-align:center;
    font-weight:800;
    font-size:18px;
    padding:18px;
    letter-spacing:1px;
}

/* HOME */
.container{
    padding:25px;
    max-width:500px;
    margin:auto;
}

.title{
    font-size:28px;
    font-weight:800;
}

.subtitle{
    opacity:0.8;
    margin-top:8px;
    line-height:1.5;
}

.card{
    margin-top:25px;
    background:rgba(255,255,255,0.08);
    padding:18px;
    border-radius:14px;
    text-align:left;
}

.card p{
    margin:10px 0;
    font-size:15px;
}

button{
    width:100%;
    padding:16px;
    margin-top:25px;
    border:none;
    border-radius:40px;
    font-size:17px;
    font-weight:600;
    background:linear-gradient(90deg,#00c6ff,#00ffa3);
    color:#fff;
}

/* CAMERA */
.camera-wrap{
    position:relative;
    margin-top:30px;
}

video{
    width:100%;
    border-radius:20px;
}

/* SCANNER */
.oval{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:260px;
    height:340px;
    border-radius:50%;
    border:4px solid #00ffa3;
    box-shadow:0 0 25px #00ffa3;
}

/* RESULT */
.result{
    text-align:center;
    margin-top:100px;
    font-size:26px;
    font-weight:800;
}

.success{
    background:linear-gradient(180deg,#0f9d58,#00e676);
}

.fail{
    background:linear-gradient(180deg,#b00020,#ff1744);
}

.hidden{display:none;}

</style>
</head>

<body>

<div class="header">
CYBERSECURITY WARES STORE VERIFICATION PORTAL
</div>

<!-- HOME -->
<div id="home" class="container">
    <div class="title">Face Verification</div>

    <div class="subtitle">
        Please follow the instructions to complete face verification to secure your account.
    </div>

    <div class="card">
        <p>✔ Stay in a brightly lit environment</p>
        <p>✔ Your face is inside the frame</p>
        <p>✔ Remove glasses, hats, masks</p>
    </div>

    <button onclick="start()">Start Verification</button>
</div>

<!-- CAMERA -->
<div id="cameraPage" class="container hidden">
    <div class="title" id="instruction">Align your face</div>

    <div class="camera-wrap">
        <video id="video" autoplay playsinline></video>
        <div class="oval"></div>
    </div>

    <button onclick="startCheck()">Verify</button>
</div>

<!-- RESULT -->
<div id="resultPage" class="container hidden">
    <div id="resultText" class="result"></div>
    <button onclick="location.reload()">Start Again</button>
</div>

<script>

let blink = false;
let aligned = false;

/* START */
function start(){
    home.classList.add("hidden");
    cameraPage.classList.remove("hidden");
    initCamera();
}

/* CAMERA + AI */
async function initCamera(){

    const video = document.getElementById("video");

    const stream = await navigator.mediaDevices.getUserMedia({video:true});
    video.srcObject = stream;

    const faceMesh = new FaceMesh({
        locateFile:(file)=>`https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
    });

    faceMesh.setOptions({
        maxNumFaces:1,
        refineLandmarks:true
    });

    faceMesh.onResults(results=>{
        if(results.multiFaceLandmarks.length>0){

            aligned = true;

            const lm = results.multiFaceLandmarks[0];

            const top = lm[159];
            const bottom = lm[145];

            let eyeDist = Math.abs(top.y - bottom.y);

            if(eyeDist < 0.015){
                blink = true;
                instruction.innerText = "Blink detected";
            }
        }else{
            aligned = false;
            instruction.innerText = "Align your face";
        }
    });

    const camera = new Camera(video,{
        onFrame: async()=>{
            await faceMesh.send({image:video});
        },
        width:480,
        height:640
    });

    camera.start();
}

/* VERIFY */
function startCheck(){

    instruction.innerText = "Checking...";

    setTimeout(()=>{

        cameraPage.classList.add("hidden");
        resultPage.classList.remove("hidden");

        if(blink && aligned){
            document.body.className="success";
            resultText.innerText="Verification Successful";
        }else{
            document.body.className="fail";
            resultText.innerText="Verification Failed";
        }

    },3000);
}

</script>

</body>
</html>
