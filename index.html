<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI,Roboto,sans-serif;}
body{
    background:#05070d;
    color:#e6faff;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-start;
    min-height:100vh;
}
header{
    width:100%;
    padding:20px;
    text-align:center;
    font-size:1.3rem;
    letter-spacing:1px;
    color:#00e5ff;
    border-bottom:1px solid rgba(0,255,255,0.2);
    box-shadow:0 0 20px rgba(0,255,255,0.1);
}
.container{
    width:100%;
    max-width:600px;
    padding:20px;
    text-align:center;
}
.video-wrapper{
    position:relative;
    width:100%;
    aspect-ratio:3/4;
    border-radius:20px;
    overflow:hidden;
    border:1px solid rgba(0,255,255,0.3);
    box-shadow:0 0 30px rgba(0,255,255,0.15);
}
video,canvas{
    position:absolute;
    width:100%;
    height:100%;
    object-fit:cover;
}
.scanner{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:60%;
    height:70%;
    border-radius:50%/60%;
    border:2px solid rgba(0,255,255,0.8);
    box-shadow:0 0 25px rgba(0,255,255,0.7);
    animation:pulse 2s infinite;
}
@keyframes pulse{
    0%{box-shadow:0 0 10px #00e5ff;}
    50%{box-shadow:0 0 30px #00e5ff;}
    100%{box-shadow:0 0 10px #00e5ff;}
}
.progress{
    margin-top:20px;
    width:120px;
    height:120px;
    border-radius:50%;
    border:6px solid rgba(0,255,255,0.2);
    position:relative;
}
.progress::after{
    content:attr(data-progress) "%";
    position:absolute;
    top:50%;left:50%;
    transform:translate(-50%,-50%);
    font-size:1.2rem;
}
.status{
    margin-top:20px;
    font-size:1rem;
    min-height:24px;
}
.notice{
    margin-top:20px;
    font-size:0.8rem;
    opacity:0.7;
}
button{
    margin-top:15px;
    padding:12px 20px;
    border:none;
    border-radius:8px;
    background:#00e5ff;
    color:#000;
    font-weight:bold;
    cursor:pointer;
    display:none;
}
.success{color:#00ff88;}
.error{color:#ff4d4d;}
</style>
</head>
