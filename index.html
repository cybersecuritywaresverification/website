<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verification Portal</title>

<!-- MediaPipe -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>

<style>
body {
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    background: linear-gradient(180deg,#081a3a,#0f2b6d);
    color:white;
    text-align:center;
}

.header {
    padding:15px;
    font-weight:600;
    font-size:14px;
    background:#0a1f4d;
    letter-spacing:1px;
}

.container {
    padding:25px;
}

.card {
    background:rgba(255,255,255,0.08);
    padding:15px;
    border-radius:12px;
    margin:20px;
}

button {
    width:90%;
    padding:15px;
    border:none;
    border-radius:30px;
    font-size:18px;
    background:linear-gradient(90deg,#00d2ff,#3affb3);
    color:white;
}

video {
    width:100%;
    max-width:400px;
    border-radius:20px;
}

.oval {
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:260px;
    height:340px;
    border-radius:50%;
    border:4px solid #3affb3;
    box-shadow:0 0 20px #3affb3;
    animation:glow 2s infinite alternate;
}

@keyframes glow {
    from {box-shadow:0 0 10px #3affb3;}
    to {box-shadow:0 0 30px #3affb3;}
}

.progress-ring {
    width:100px;
    height:100px;
    border-radius:50%;
    border:6px solid #3affb3;
    margin:auto;
    margin-top:20px;
}

.hidden {display:none;}

@media (max-width:600px){
    h1 {font-size:22px;}
}
</style>
</head>

<body>

<div class="header">
Cybersecurity Wares Store Verification Portal
</div>

<!-- HOME -->
<div id="home" class="container">
    <h1>Face Verification</h1>
    <p>Please follow the instructions to complete verification.</p>

    <div class="card">
        <p>✔ Stay in bright environment</p>
        <p>✔ Face inside frame</p>
        <p>✔ Remove glasses/masks</p>
    </div>

    <button onclick="startVerification()">Start Verification</button>
</div>

<!-- CAMERA -->
<div id="cameraPage" class="container hidden">
    <h2 id="instruction">Align your face</h2>

    <div style="position:relative;">
        <video id="video" autoplay playsinline></video>
        <div class="oval"></div>
    </div>

    <div class="progress-ring" id="progress"></div>

    <button onclick="manualVerify()">Verify</button>
</div>

<!-- RESULT -->
<div id="resultPage" class="container hidden">
    <h1 id="resultText"></h1>
    <button onclick="location.reload()">Start Again</button>
</div>

<script>
let blinkDetected = false;
let verifying = false;

// START
function startVerification(){
    document.getElementById("home").classList.add("hidden");
    document.getElementById("cameraPage").classList.remove("hidden");
    initCamera();
    speak("Please blink your eyes to begin verification");
}

// VOICE
function speak(text){
    let msg = new SpeechSynthesisUtterance(text);
    speechSynthesis.speak(msg);
}

// CAMERA
async function initCamera(){
    const video = document.getElementById("video");

    const stream = await navigator.mediaDevices.getUserMedia({video:true});
    video.srcObject = stream;

    const faceMesh = new FaceMesh({
        locateFile:(file)=>`https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
    });

    faceMesh.setOptions({
        maxNumFaces:1,
        refineLandmarks:true
    });

    let lastBlinkTime = 0;

    faceMesh.onResults(results=>{
        if(results.multiFaceLandmarks.length > 0){
            const lm = results.multiFaceLandmarks[0];

            const eyeTop = lm[159];
            const eyeBottom = lm[145];
            const dist = Math.abs(eyeTop.y - eyeBottom.y);

            if(dist < 0.01 && Date.now()-lastBlinkTime>1500){
                lastBlinkTime = Date.now();
                blinkDetected = true;
                speak("Blink detected. Starting verification");
                startCountdown();
            }
        }
    });

    const camera = new Camera(video,{
        onFrame: async ()=>{
            await faceMesh.send({image:video});
        },
        width:480,
        height:640
    });

    camera.start();
}

// COUNTDOWN
function startCountdown(){
    if(verifying) return;
    verifying = true;

    let seconds = 10;
    const instruction = document.getElementById("instruction");

    const interval = setInterval(()=>{
        instruction.innerText = "Verifying... " + seconds;
        seconds--;

        if(seconds===7){
            speak("Turn your head left");
        }
        if(seconds===4){
            speak("Turn your head right");
        }

        if(seconds <= 0){
            clearInterval(interval);
            finishVerification();
        }

    },1000);
}

// MANUAL BUTTON
function manualVerify(){
    startCountdown();
}

// RESULT
function finishVerification(){
    document.getElementById("cameraPage").classList.add("hidden");
    document.getElementById("resultPage").classList.remove("hidden");

    // simple logic (no storage)
    let success = blinkDetected;

    if(success){
        document.getElementById("resultText").innerText = "Verification Successful";
        document.body.style.background = "linear-gradient(180deg,#0a7f4f,#00c896)";
    } else {
        document.getElementById("resultText").innerText = "Verification Failed";
        document.body.style.background = "linear-gradient(180deg,#7f0a0a,#c80000)";
    }
}
</script>

</body>
</html>
